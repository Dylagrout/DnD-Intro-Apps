
<style>
  :root {
    --gold: #BA7517;
    --gold-light: #FAEEDA;
    --gold-mid: #FAC775;
    --ink: var(--color-text-primary);
    --muted: var(--color-text-secondary);
    --surface: var(--color-background-primary);
    --surface2: var(--color-background-secondary);
    --border: var(--color-border-tertiary);
    --border2: var(--color-border-secondary);
    --rad: var(--border-radius-lg);
    --rad-sm: var(--border-radius-md);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #app { padding: 1.5rem 1rem 2rem; font-family: var(--font-sans); max-width: 640px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; color: var(--ink); }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .progress-bar { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }

  .question-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad);
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 1rem;
  }
  .q-step { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .q-icon,
.result-icon {
  font-family: system-ui, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
}
  .q-text { font-size: 16px; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .q-sub { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .options.solo { grid-template-columns: 1fr; }

  .opt-btn {
    background: var(--surface);
    border: 2px solid black;
    border-radius: var(--rad-sm);
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    color: var(--ink);
    font-family: var(--font-sans);
  }
  .opt-btn:hover { border-color: var(--gold); background: var(--surface2); transform: translateY(-1px); }
  .opt-btn:active { transform: scale(0.98); }
  .opt-label { font-size: 13px; font-weight: 500; color: var(--ink); display: block; line-height: 1.3; }
  .opt-desc { font-size: 11px; color: var(--muted); margin-top: 3px; display: block; line-height: 1.4; }

  .back-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--rad-sm);
    padding: 7px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-sans);
    transition: border-color 0.15s, color 0.15s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .back-btn:hover { border-color: var(--border2); color: var(--ink); }

  .result-card {
    background: var(--surface);
    border: 2px solid var(--color-border-info);
    border-radius: var(--rad);
    padding: 1.5rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.35s ease;
  }
  .result-main { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 1rem; }
  .result-icon { font-size: 2.5rem; line-height: 1; flex-shrink: 0; }
  .result-icon-img {width: 256px; height: 256px; object-fit: contain; flex-shrink: 0; display: block;}
  .result-class { font-size: 22px; font-weight: 500; color: var(--ink); }
  .result-subclass { font-size: 14px; color: var(--color-text-info); margin-top: 2px; font-weight: 500; }
  .result-tagline { font-size: 13px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .result-section { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
  .result-section-title { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .result-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.65; }

  .trait-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid gray; color: var(--color-text-secondary); background: var(--surface2); }

  .alt-section { margin-top: 1rem; }
  .alt-title { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .alt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .alt-card {
    background: var(--surface2);
    border: 1px solid black;
    border-radius: var(--rad-sm);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .alt-card:hover { border-color: var(--gold); background: var(--surface); }
  .alt-class { font-size: 12px; font-weight: 500; color: var(--ink); }
  .alt-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .restart-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad-sm);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    font-family: var(--font-sans);
    width: 100%;
    text-align: center;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .restart-btn:hover { background: var(--surface); border-color: var(--gold); }

  .path-display {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    margin-bottom: 1rem; padding: 8px 12px;
    background: var(--surface2); border-radius: var(--rad-sm);
    border: 0.5px solid var(--border);
    min-height: 36px;
  }
  .path-crumb { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .path-crumb-label { color: var(--color-text-secondary); font-weight: 500; }
  .path-sep { opacity: 0.4; }
  .path-empty { font-size: 11px; color: var(--muted); font-style: italic; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:none; } }
  .q-anim { animation: slideIn 0.25s ease; }
</style>

const flow = {
  "position":           { "front":"front_magic", "back":"back_magic_source", "flex":"flex_vibe", "stealth":"stealth_magic" },
  "front_magic":        { "no":"front_nomag_vibe", "some":"front_some_magic", "divine":"paladin_sub" },
  "front_nomag_vibe":   { "barbarian":"barbarian_sub", "fighter":"fighter_sub", "monk":"monk_sub" },
  "front_some_magic":   { "paladin_sub":"paladin_sub", "ranger_sub":"ranger_sub", "valor_bard":"valor_bard_result" },
  "back_magic_source":  { "wizard":"wizard_sub", "sorcerer":"sorcerer_sub", "warlock":"warlock_sub", "divine_back":"divine_back_type" },
  "divine_back_type":   { "cleric":"cleric_sub", "druid":"druid_sub" },
  "flex_vibe":          { "bard":"bard_sub", "paladin_or_ranger_flex":"flex_fighter_choice" },
  "flex_fighter_choice":{ "cleric_sub":"cleric_sub", "paladin_sub":"paladin_sub", "ranger_sub":"ranger_sub" },
  "stealth_magic":      { "rogue_sub":"rogue_sub", "arcane_rogue":"rogue_sub" }
};

const terminalQuestions = new Set(["barbarian_sub","fighter_sub","monk_sub","ranger_sub","paladin_sub","wizard_sub","sorcerer_sub","warlock_sub","cleric_sub","druid_sub","bard_sub","rogue_sub"]);

let history = [];
let choiceLabels = [];
let currentQ = "position";
let stepNum = 0;

function getQ(id) { return questions.find(q => q.id === id); }

function updatePath() {
  const pathEl = document.getElementById('path-display');
  if (choiceLabels.length === 0) {
    pathEl.innerHTML = '<span class="path-empty">Your choices will appear here...</span>';
  } else {
    pathEl.innerHTML = choiceLabels.map((c, i) =>
      `<span class="path-crumb">${i > 0 ? '<span class="path-sep">›</span>' : ''}<span class="path-crumb-label">${c}</span></span>`
    ).join('');
  }
}

function render() {
  document.getElementById('prog').style.width = Math.min(100, Math.round((stepNum / 3) * 100)) + '%';
  updatePath();

  const q = getQ(currentQ);
  if (!q) return;

  const cols = q.options.length > 3 ? '' : 'solo';
  document.getElementById('content').innerHTML = `
    <div class="question-card q-anim">
      <div class="q-step">Question ${stepNum + 1}</div>
      <span class="q-icon">${q.icon}</span>
      <div class="q-text">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
    </div>
    <div class="options ${cols}">
      ${q.options.map(o => `<button class="opt-btn" onclick="choose('${o.value}', '${o.label.replace(/'/g,"\\'")}')"><span class="opt-label">${o.label}</span><span class="opt-desc">${o.desc}</span></button>`).join('')}
    </div>
    ${history.length > 0 ? '<div style="margin-top:10px"><button class="back-btn" onclick="goBack()">← Back</button></div>' : ''}
  `;
}

function choose(value, label) {
  history.push({ q: currentQ, choiceLabels: [...choiceLabels], stepNum });
  choiceLabels.push(label);
  stepNum++;

  if (results[value]) { showResult(value); return; }
  if (value === 'valor_bard_result') { showResult('Valor Bard'); return; }

  const next = flow[currentQ]?.[value];
  if (!next) return;
  currentQ = next;
  render();
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  currentQ = prev.q;
  choiceLabels = prev.choiceLabels;
  stepNum = prev.stepNum;
  render();
}

function goToResult(key) {
  history.push({ q: currentQ, choiceLabels: [...choiceLabels], stepNum });
  choiceLabels.push(results[key].sub);
  stepNum++;
  showResult(key);
}

function showResult(key) {
  const r = results[key];
  if (!r) return;
  document.getElementById('prog').style.width = '100%';
  updatePath();

  const iconHtml = r.iconType === "image"
  ? `<img class="result-icon-img" src="${r.icon}" alt="${r.sub} icon">`
  : `<div class="result-icon">${r.icon}</div>`;

  const altsHtml = r.alts ? `
    <div class="alt-section">
      <div class="alt-title">You might also enjoy</div>
      <div class="alt-grid">
        ${r.alts.map(a => `
          <div class="alt-card" onclick="goToResult('${a.key}')">
            <div class="alt-class">${a.l}</div>
            <div class="alt-sub">${a.sl}</div>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="result-card">
      <div class="result-main">
        ${iconHtml}
        <div class="result-title-group">
          <div class="result-class">${r.cls}</div>
          <div class="result-subclass">${r.sub}</div>
          <div class="result-tagline">"${r.tagline}"</div>
        </div>
      </div>
      <div class="trait-pills">${r.traits.map(t => `<span class="pill">${t}</span>`).join('')}</div>
      <div class="result-section">
        <div class="result-section-title">Why this fits you</div>
        <div class="result-desc">${r.desc}</div>
      </div>
      ${altsHtml}
    </div>
    <button class="restart-btn" onclick="restart()">↺ Start over — try a different path</button>
    <div style="margin-top:8px;text-align:center">
      <button class="back-btn" onclick="goBack()">← Go back</button>
    </div>
  `;
}

function restart() {
  history = []; choiceLabels = []; currentQ = "position"; stepNum = 0;
  document.getElementById('prog').style.width = '0%';
  render();
}

render();
</script>
