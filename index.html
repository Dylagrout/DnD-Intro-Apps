
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Intro App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="header">
      <h2>What class should you play?</h2>
      <p>Answer a few questions to find your perfect match</p>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="prog"></div>
    </div>

    <div class="path-display" id="path-display">
      <span class="path-empty">Your choices will appear here...</span>
    </div>

    <div id="content"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
